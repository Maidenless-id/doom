<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <script src="https://js-dos.com/v7/build/js-dos.js"></script>
    <link href="https://js-dos.com/v7/build/js-dos.css" rel="stylesheet">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // Inicialización simplificada
        jsDOS.configure({
            wdosboxUrl: "https://js-dos.com/v7/build/wdosbox.js",
            cycles: 1000,
            autolock: true
        });

        const container = document.getElementById("doom");
     Dos(container).run("doom.jsdos");
    </script>
</body>
</html>
