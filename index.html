<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOOM</title>
    <script src="https://js-dos.com/6.22/v7/js-dos.js"></script>
    <link href="https://js-dos.com/6.22/v7/js-dos.css" rel="stylesheet">
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        #doom { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="doom"></div>
    <script>
        // Esperamos a que la librería cargue completamente antes de ejecutar
        window.addEventListener("load", function() {
            Dos(document.getElementById("doom")).run("https://archive.org/download/doom_20260622/doom.jsdos");
        });
    </script>
</body>
</html>
